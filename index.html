<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Swey IDE</title>
    <style>
        :root { 
            --bg: #000000; --panel: #0a0a0a; --ui: #161616; --accent: #8ebfff; 
            --border: #222222; --text-main: #ffffff; --text-dim: #555555; 
            --danger: #ff5f5f; --font: -apple-system, system-ui, sans-serif;
            --code-font: 'SF Mono', 'Menlo', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: var(--font); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #stage { flex: 1; position: relative; z-index: 1; background: #000; }
        #world { width: 100%; height: 100%; border: none; }

        /* EDITOR PANE & LAYERING */
        #code-pane { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 140px; 
            background: var(--panel); z-index: 50; display: none; flex-direction: column;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        #editor-container { position: relative; flex: 1; overflow: hidden; display: flex; }

        /* CRITICAL SYNC: Fixed alignment and formatting */
        #editor, #highlight-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            margin: 0; padding: 20px 80px 300px 20px;
            font-family: var(--code-font); font-size: 14px; line-height: 1.5;
            tab-size: 4; -moz-tab-size: 4; white-space: pre; word-wrap: normal;
            border: none; overflow: auto; -webkit-font-smoothing: antialiased;
        }

        #editor { 
            background: transparent; color: transparent; caret-color: #fff; 
            z-index: 2; resize: none; -webkit-text-fill-color: transparent; 
        }
        #highlight-layer { z-index: 1; color: #abb2bf; pointer-events: none; display: block; }

        /* MINIMAP */
        #minimap-gutter {
            position: absolute; top: 0; right: 0; width: 60px; height: 100%;
            background: rgba(0,0,0,0.4); border-left: 1px solid var(--border);
            z-index: 10; overflow: hidden; touch-action: none;
        }
        #minimap-content { font-size: 2px; line-height: 2px; padding: 5px; white-space: pre; color: var(--text-dim); opacity: 0.3; }
        #minimap-viewport {
            position: absolute; top: 0; left: 0; width: 100%;
            background: rgba(142, 191, 255, 0.1); border-top: 1px solid var(--accent);
            border-bottom: 1px solid var(--accent); pointer-events: none;
        }

        /* SYNTAX THEME */
        .hl-comm { color: #5c6370; font-style: italic; }
        .hl-str { color: #a8e6cf; }
        .hl-tag { color: #8ebfff; }
        .hl-attr { color: #ffcc66; }
        .hl-key { color: #c792ea; }
        .hl-num { color: #f78c6c; }

        #control-complex { position: relative; z-index: 100; background: var(--panel); border-top: 1px solid var(--border); }
        #utility-row { display: none; padding: 8px 15px; background: var(--ui); border-bottom: 1px solid var(--border); justify-content: space-between; align-items: center; }
        
        .v-tag { font-size: 10px; font-weight: 800; color: var(--text-dim); margin-right: 10px; }
        #model-info { font-size: 9px; color: var(--text-dim); text-transform: uppercase; }
        #model-info b { color: var(--accent); }
        #model-selector { background: #1a1a1a; color: var(--accent); border: 1px solid var(--border); font-size: 9px; padding: 4px 8px; border-radius: 6px; appearance: none; }

        #command-dock { display: grid; grid-template-columns: repeat(3, 1fr); padding: 8px 5px; }
        .dock-btn { background: transparent; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-dim); }
        .dock-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .dock-btn span { font-size: 9px; font-weight: 700; text-transform: uppercase; }
        .dock-btn.active { color: var(--accent); }

        #input-dock { padding: 0 15px calc(15px + env(safe-area-inset-bottom)); display: flex; align-items: flex-end; gap: 10px; }
        #input-container { flex: 1; background: var(--ui); border: 1px solid var(--border); border-radius: 18px; padding: 12px 16px; min-height: 48px; max-height: 150px; display: flex; align-items: center; }
        #input { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; line-height: 1.4; resize: none; overflow-y: auto; }
        #go { background: var(--accent); border: none; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* ARCHIVE & SEARCH */
        #archive { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: none; flex-direction: column; padding: calc(40px + env(safe-area-inset-top)) 24px 40px; }
        #archive-search { background: var(--ui); border: 1px solid var(--border); color: #fff; border-radius: 12px; padding: 12px; margin-bottom: 20px; font-size: 14px; width: 100%; }
        .project-item { background: var(--panel); padding: 18px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        .project-header { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="stage"><iframe id="world"></iframe></div>

<div id="code-pane">
    <div id="editor-container">
        <div id="highlight-layer" aria-hidden="true"></div>
        <textarea id="editor" spellcheck="false" oninput="handleEditorInput()" onscroll="syncScroll()"></textarea>
        <div id="minimap-gutter" onpointerdown="mapSeek(event)" onpointermove="mapSeek(event)">
            <div id="minimap-content"></div>
            <div id="minimap-viewport"></div>
        </div>
    </div>
</div>

<div id="control-complex">
    <div id="utility-row">
        <div style="display:flex; align-items:center;">
            <span class="v-tag" id="size-tag">0.0 KB</span>
            <div id="model-info"><b>ARCH:</b> Structure</div>
            <select id="model-selector" onchange="updateModelInfo()">
                <option value="architect">Architect</option>
                <option value="technologist">Technologist</option>
                <option value="engineer">Engineer</option>
                <option value="analyst">Analyst</option>
                <option value="designer">Designer</option>
            </select>
        </div>
        <div class="util-group" style="display:flex; gap:18px;">
            <button class="dock-btn" onclick="undo()"><svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg></button>
            <button class="dock-btn" onclick="copyCurrent()"><svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button>
            <button class="dock-btn" onclick="wipe()" style="color:var(--danger)"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
        </div>
    </div>

    <nav id="command-dock">
        <button class="dock-btn" id="btn-dev" onclick="toggleCode()"><svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg><span>Develop</span></button>
        <button class="dock-btn" onclick="openArchive()"><svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg><span>Archive</span></button>
        <button class="dock-btn" onclick="save()"><svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg><span>Save</span></button>
    </nav>

    <div id="input-dock">
        <div id="input-container"><textarea id="input" rows="1" placeholder="Describe the magic..." oninput="autoExpand(this)"></textarea></div>
        <button id="go" onclick="evolve()"><svg viewBox="0 0 24 24" width="20" height="20" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
</div>

<div id="archive">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 style="margin:0; font-size: 28px;">Archive</h2>
        <button style="background:transparent; border:none; color:var(--accent); font-weight:800;" onclick="closeArchive()">DONE</button>
    </div>
    <input type="text" id="archive-search" placeholder="Search projects..." oninput="renderArchiveList()">
    <div id="list" style="overflow-y:auto; flex: 1;"></div>
</div>

<script>
    const editor = document.getElementById('editor');
    const highlightLayer = document.getElementById('highlight-layer');
    const miniContent = document.getElementById('minimap-content');
    const miniView = document.getElementById('minimap-viewport');
    const world = document.getElementById('world');
    const input = document.getElementById('input');
    const codePane = document.getElementById('code-pane');
    const utilRow = document.getElementById('utility-row');
    const devBtn = document.getElementById('btn-dev');
    const modelSelector = document.getElementById('model-selector');
    const modelInfo = document.getElementById('model-info');
    let history = [];

    const WORKER_URL = atob("aHR0cHM6Ly9tb25vbGl0aC13b3JrZXIuc3dleWRldi53b3JrZXJzLmRldg==");

    const PROMPTS = {
        architect: "MANDATORY: Return a SINGLE HTML5 file. ABSOLUTELY NO 800x600 containers. Use <canvas> and CSS: body{margin:0;overflow:hidden;} canvas{width:100vw;height:100vh;display:block;touch-action:none;}. Map touch coordinates using canvas.getBoundingClientRect(). No emojis.",
        technologist: "MANDATORY: High-end visuals. No fixed 800x600 boxes. Canvas MUST fill 100vw/100vh. No margins/scrollbars. Touch-based input only. No emojis.",
        engineer: "MANDATORY: Performance focus. Responsive 100vw/100vh canvas. No fixed width/height containers. No emojis.",
        analyst: "MANDATORY: Logic fix. Coordinate mapping for mobile touch. Eliminate fixed 800x600 containers. No emojis.",
        designer: "MANDATORY: UI focus. 100vw/100vh canvas. Thumb-friendly controls. No emojis."
    };

    const DESCRIPTIONS = { architect: "<b>ARCH:</b> Structure", technologist: "<b>TECH:</b> Visual Juice", engineer: "<b>ENG:</b> Performance", analyst: "<b>ANA:</b> Logic", designer: "<b>DES:</b> UI/UX" };

    function updateModelInfo() { modelInfo.innerHTML = DESCRIPTIONS[modelSelector.value]; }
    function autoExpand(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

    /* SINGLE-PASS HIGHLIGHTER: Stops "Highlighting the Highlights" */
    function applyHighlighting(code) {
        const escaped = code.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        const pattern = /(&lt;!--[\s\S]*?--&gt;)|(".+?"|'.+?')|(&lt;\/?[a-z1-6]+|&gt;)|(\b(?:function|var|let|const|if|else|return|for|while|new|try|catch|async|await|window|document|Math|canvas|ctx)\b)|(\b\d+\b)|(\s[a-z-]+(?==))/gi;

        return escaped.replace(pattern, (match, comm, str, tag, key, num, attr) => {
            if (comm) return `<span class="hl-comm">${comm}</span>`;
            if (str) return `<span class="hl-str">${str}</span>`;
            if (tag) return `<span class="hl-tag">${tag}</span>`;
            if (key) return `<span class="hl-key">${key}</span>`;
            if (num) return `<span class="hl-num">${num}</span>`;
            if (attr) return `<span class="hl-attr">${attr}</span>`;
            return match;
        });
    }

    function handleEditorInput() {
        const code = editor.value;
        highlightLayer.innerHTML = applyHighlighting(code) + "\n\n";
        miniContent.innerText = code;
        syncSize();
        updateMinimapViewport();
    }

    function syncScroll() {
        highlightLayer.scrollTop = editor.scrollTop;
        highlightLayer.scrollLeft = editor.scrollLeft;
        updateMinimapViewport();
    }

    function updateMinimapViewport() {
        const ratio = editor.clientHeight / editor.scrollHeight;
        miniView.style.height = Math.max(10, ratio * 100) + "%";
        miniView.style.top = (editor.scrollTop / editor.scrollHeight * 100) + "%";
    }

    function mapSeek(e) {
        if (e.buttons !== 1 && e.type !== 'pointerdown') return;
        const rect = document.getElementById('minimap-gutter').getBoundingClientRect();
        const pos = (e.clientY - rect.top) / rect.height;
        editor.scrollTop = (pos * editor.scrollHeight) - (editor.clientHeight / 2);
    }

    function toggleCode() {
        const isOpen = codePane.style.display === 'flex';
        codePane.style.display = isOpen ? 'none' : 'flex';
        utilRow.style.display = isOpen ? 'none' : 'flex';
        devBtn.classList.toggle('active');
        if (isOpen) world.srcdoc = editor.value; else handleEditorInput();
    }

    function syncSize() {
        const kb = (new Blob([editor.value]).size / 1024).toFixed(1);
        document.getElementById('size-tag').innerText = kb + " KB";
    }

    function save() {
        const name = prompt("Name sequence:"); if(!name) return;
        const db = JSON.parse(localStorage.getItem('K_DNA') || '{}');
        db[name] = { dna: editor.value, date: new Date().toLocaleDateString() };
        localStorage.setItem('K_DNA', JSON.stringify(db));
    }

    function openArchive() { document.getElementById('archive').style.display = 'flex'; renderArchiveList(); }
    function closeArchive() { document.getElementById('archive').style.display = 'none'; }

    function renderArchiveList() {
        const query = document.getElementById('archive-search').value.toLowerCase();
        const db = JSON.parse(localStorage.getItem('K_DNA') || '{}');
        const list = document.getElementById('list');
        list.innerHTML = '';
        Object.keys(db).filter(n => n.toLowerCase().includes(query)).sort().forEach(n => {
            const card = document.createElement('div');
            card.className = 'project-item';
            card.innerHTML = `
                <div class="project-header">
                    <div><h4 style="margin:0;">${n}</h4><span style="font-size:10px; color:var(--text-dim);">${db[n].date}</span></div>
                    <button style="color:var(--accent); background:transparent; border:none; font-weight:700;" onclick="load('${n}')">RESTORE</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function load(n) {
        const db = JSON.parse(localStorage.getItem('K_DNA') || '{}');
        editor.value = db[n].dna;
        history.push(editor.value);
        world.srcdoc = editor.value;
        handleEditorInput();
        closeArchive();
        if(codePane.style.display === 'flex') toggleCode();
    }

    function copyCurrent() { navigator.clipboard.writeText(editor.value); }
    function undo() { if(history.length > 1) { history.pop(); editor.value = history[history.length-1]; handleEditorInput(); world.srcdoc = editor.value; } }
    function wipe() { if(confirm("Delete all code?")) { editor.value = ""; handleEditorInput(); world.srcdoc = ""; } }

    async function evolve() {
        const cmd = input.value.trim(); if(!cmd) return;
        input.placeholder = "Forging DNA...";
        const sys = PROMPTS[modelSelector.value] + " COMMAND: " + cmd;
        try {
            const res = await fetch(WORKER_URL, { method: "POST", body: JSON.stringify({ source: editor.value, task: sys }) });
            const data = await res.json();
            editor.value = data.response || data.html;
            history.push(editor.value);
            handleEditorInput();
            world.srcdoc = editor.value;
            if(codePane.style.display === 'flex') toggleCode();
        } catch(e) { alert("Core Fault"); }
        input.value = ""; input.placeholder = "Describe the magic...";
    }

    window.onload = () => { if(editor.value) { history.push(editor.value); handleEditorInput(); } };
</script>
</body>
</html>

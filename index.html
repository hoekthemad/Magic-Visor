<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Nexus OS</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Inter', sans-serif; color: #fff; overflow-x: hidden; }

        /* Cinematic Splash Screen */
        #splash-screen {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo-circle {
            width: 80px; height: 80px; border: 1px solid #333; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.3; transform: scale(0.9); } }

        /* Main Hub UI */
        #hub-ui {
            padding: 80px 24px 60px 24px; opacity: 0; transition: opacity 1s;
            max-width: 500px; margin: 0 auto;
        }
        .header { margin-bottom: 40px; text-align: left; }
        .header h1 { font-weight: 300; letter-spacing: 12px; font-size: 18px; margin: 0; color: #fff; text-transform: uppercase; }
        .header p { font-size: 9px; letter-spacing: 3px; color: #444; margin: 8px 0; }

        .category { margin-top: 30px; margin-bottom: 15px; font-size: 8px; font-weight: 600; letter-spacing: 4px; color: #444; text-transform: uppercase; border-bottom: 1px solid #111; padding-bottom: 8px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .vision-card {
            background: #080808; border: 1px solid #151515; padding: 20px 10px;
            border-radius: 16px; transition: 0.2s; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .vision-card:active { background: #fff; color: #000; border-color: #fff; transform: scale(0.96); }
        .vision-card:active svg { stroke: #000; }
        
        .card-title { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

        svg { width: 20px; height: 20px; stroke: #444; stroke-width: 1.5; fill: none; transition: 0.2s; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-circle">
            <svg viewBox="0 0 24 24" style="stroke: #fff; width: 30px; height: 30px;">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 2v20M2 12h20"></path>
            </svg>
        </div>
        <p style="margin-top: 24px; font-size: 8px; letter-spacing: 6px; color: #333; font-weight: 600;">SYSTEM BOOT</p>
    </div>

    <div id="hub-ui">
        <div class="header">
            <h1>Nexus.OS</h1>
            <p>Choose a website.</p>
        </div>

        <div id="mount"></div>
    </div>

    <script>
        const ICONS = {
            art: `<svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.5 1.5"></path></svg>`,
            music: `<svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>`,
            code: `<svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>`,
            play: `<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M10 8l6 4-6 4V8z"></path></svg>`,
            world: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>`,
            archive: `<svg viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>`
        };

        const VISIONS = [
            { cat: "Creative Platforms", items: [
                { name: "Arts & Culture", url: "https://artsandculture.google.com/project/games", icon: 'art' },
                { name: "Music Lab", url: "https://musiclab.chromeexperiments.com/", icon: 'music' },
                { name: "Open Processing", url: "https://openprocessing.org/browse/#", icon: 'code' }
            ]},
            { cat: "Interactive Toys", items: [
                { name: "Infinite Craft", url: "https://neal.fun/infinite-craft/", icon: 'play' },
                { name: "Sand Spiel", url: "https://sandspiel.club/", icon: 'world' },
                { name: "Liquid Simulation", url: "https://paveldogreat.github.io/WebGL-Fluid-Simulation/", icon: 'play' }
            ]},
            { cat: "Immersive Worlds", items: [
                { name: "Itch.io Web", url: "https://itch.io/games/platform-web", icon: 'world' },
                { name: "GeoGuessr", url: "https://www.geoguessr.com/", icon: 'world' },
                { name: "Poki Arcade", url: "https://poki.com/", icon: 'play' },
                { name: "Little Alchemy 2", url: "https://littlealchemy2.com/", icon: 'play' }
            ]},
            { cat: "Internal Archive", items: [
                { name: "Local Projects", url: "index.html", icon: 'archive' }
            ]},
            { cat: "Discovery & Zen", items: [
                { name: "Radio Garden", url: "http://radio.garden", icon: 'world' },
                { name: "Silk Art", url: "http://weavesilk.com/", icon: 'art' },
                { name: "WindowSwap", url: "https://www.window-swap.com/", icon: 'world' },
                { name: "Stars", url: "https://stars.chromeexperiments.com/", icon: 'world' }
            ]},
            { cat: "Retro & Logic", items: [
                { name: "Neal.fun", url: "https://neal.fun/", icon: 'play' },
                { name: "Afternoon Boy", url: "https://afternoonboy.com/", icon: 'play' }
            ]}

        ];

        function buildUI() {
            const mount = document.getElementById('mount');
            VISIONS.forEach(section => {
                const catHeader = document.createElement('div');
                catHeader.className = 'category';
                catHeader.innerText = section.cat;
                mount.appendChild(catHeader);

                const grid = document.createElement('div');
                grid.className = 'grid';

                section.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'vision-card';
                    card.innerHTML = `${ICONS[item.icon]}<div class="card-title">${item.name}</div>`;
                    card.onclick = () => window.location.href = item.url;
                    grid.appendChild(card);
                });
                mount.appendChild(grid);
            });
        }

        window.onload = () => {
            buildUI();
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                document.getElementById('hub-ui').style.opacity = '1';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                }, 1000);
            }, 2000);
        };
    </script>
</body>
</html>

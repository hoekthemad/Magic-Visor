<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Visor - Glacial Tundra</title>

    <script lang="js" src="client/saveHandler.js"></script>
    <script lang="js" src="client/data.js"></script>
    <script lang="js" src="client/attackActions.js"></script>
    <script lang="js" src="client/uiActions.js"></script>
    <script lang="js" src="client/weaponActions.js"></script>
    <script>
        window.onload = () => { 
            initData();
            loadGame(); 
            if (state.level === 1) { 
                updateUI(); 
                respawn(); 
                updateXPOrb(); 
            } 
        };
    </script>

    <link rel="stylesheet" href="client/style/screen.css" />
</head>
<body>

    <div id="hacker-overlay"><h1>HACKER DETECTED</h1><p>RELOADING LOGS...</p></div>
    <div id="loot-alert">ITEM UNLOCKED!</div>
    <div id="travel-gate" onclick="advanceZone()">NEXT ZONE</div>

    <div id="hud-container">
        <div class="orb-wrapper">
            <svg class="xp-ring-svg" viewBox="0 0 90 90">
                <circle class="xp-ring-bg" cx="45" cy="45" r="40"></circle>
                <circle id="xp-fill-ring" class="xp-ring-fill" cx="45" cy="45" r="40"></circle>
            </svg>
            <div id="level-orb">1</div>
        </div>

        <div id="command-slot">
            <div id="btn-bounty" class="cmd-btn" onclick="buyBounty()">
                <span class="cmd-label">BOUNTY</span>
                <span><span id="bounty-cost">100</span> <img src="coin.png" class="coin-icon"></span>
            </div>
            <div style="color: rgba(255,255,255,0.1); font-size: 1.5rem; font-weight: 100;">|</div>
            <div class="cmd-btn" onclick="polishWeapon()">
                <span class="cmd-label">POLISH +<span id="polish-lv">0</span></span>
                <span><span id="polish-cost">500</span> <img src="coin.png" class="coin-icon"></span>
            </div>
        </div>

        <div class="inventory-brief">
            <div style="color: var(--gold)"><span id="coins">0</span> <img src="coin.png" class="coin-icon"></div>
            <div id="zone-mult-ui">LOOT: x1</div>
            <div style="color: var(--aura-silver)"><span id="ore">0</span> ORE</div>
            <div id="fish-count-ui" style="color: var(--aura-blue)"><span id="fish">0</span> FISH</div>
        </div>
    </div>

    <div id="world-container">
        <div id="game-bg"></div>
        <img src="slime.png" id="target" class="target-img">
        <img src="stick.png" id="weapon-hand">
    </div>

    <div id="footer">
        <div id="btn-forge" class="action-btn side-btn disabled" onclick="useOre()">
            <div class="btn-val" id="ore-cost">5</div><div class="btn-label">FORGE</div>
        </div>
        <div id="main-action" class="action-btn main-strike" onclick="toggleAuto()">
            <img src="attackicon.png" style="width:40px;">
        </div>
        <div id="btn-buff" class="action-btn side-btn disabled" onclick="useFish()">
            <svg class="buff-ring-svg">
                <circle id="buff-ring-fill" class="buff-ring-fill" cx="37.5" cy="37.5" r="36"></circle>
            </svg>
            <div class="btn-val" id="fish-cost">3</div><div class="btn-label">VITAL</div>
        </div>
        
        <div id="settings-cog" onclick="toggleSettings()">⚙</div>
        <div id="settings-menu">
            <button class="set-btn" onclick="saveGame()" style="color: var(--aura-green);">SAVE PROGRESS</button>
            <button class="set-btn" onclick="deleteSave()" style="color: var(--boss-red);">PURGE ALL DATA</button>
        </div>
    </div>
</body>
</html>

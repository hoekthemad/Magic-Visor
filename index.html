<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Visor - Glacial Tundra</title>
    <style>
        :root {
            --bg-dark: #050505;
            --aura-green: #00ff88;
            --aura-silver: #bdc3c7;
            --aura-blue: #00d4ff;
            --gold: #ffd700;
            --boss-red: #ff4444;
            --zone2-purple: #a020f0;
            --zone3-orange: #ff4500;
            --zone4-cyan: #00ffff;
        }

        body {
            background-color: var(--bg-dark);
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
            font-family: 'Arial Black', sans-serif; user-select: none; color: white;
            touch-action: manipulation;
        }

        /* --- HUD --- */
        #hud-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 95px;
            z-index: 100; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(5px);
        }

        .hud-orb {
            width: 55px; height: 55px; border-radius: 50%; border: 3px solid var(--aura-green);
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 1.4rem; box-shadow: 0 0 20px var(--aura-green);
            transition: 1s;
        }

        #exp-fill { width: 0%; height: 100%; background: var(--aura-green); box-shadow: 0 0 15px var(--aura-green); transition: width 0.4s ease; }
        #exp-bar-container { flex: 1; height: 10px; background: rgba(0,0,0,0.8); margin: 0 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); overflow: hidden; }

        .inventory-brief { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; font-size: 0.9rem; font-weight: 900; }

        /* --- WORLD --- */
        #world-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; overflow: visible; }
        #game-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('background.png') no-repeat center center; background-size: cover; z-index: 0; transition: 3s ease-in-out; }
        .target-img { width: 70vw; max-width: 260px; z-index: 10; transition: 0.4s; opacity: 1; padding: 50px; object-fit: contain; }
        #weapon-hand { position: absolute; bottom: -20px; right: -20px; width: 300px; z-index: 50; pointer-events: none; transform-origin: bottom right; transition: filter 0.5s; }

        /* --- FOOTER --- */
        #footer { position: relative; height: 160px; background: #000; display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 2px solid #333; z-index: 200; }
        
        /* NEW BOUNTY/POLISH PILL */
        #gold-pill {
            position: absolute; top: -35px; left: 20px;
            background: #1a1a1a; border: 2px solid var(--gold);
            padding: 5px 15px; border-radius: 20px;
            font-size: 0.7rem; color: var(--gold);
            display: flex; gap: 10px; cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
            z-index: 210;
        }

        .action-btn { position: relative; border-radius: 50%; background: #151515; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.2s; }
        .main-strike { width: 90px; height: 90px; border: 4px solid #555; }
        .side-btn { width: 75px; height: 75px; border: 3px solid transparent; }
        #btn-forge { border-color: var(--aura-silver); color: var(--aura-silver); }
        #btn-buff { border-color: var(--aura-blue); color: var(--aura-blue); }
        .disabled { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
        .active-glow { border-color: var(--aura-blue); box-shadow: 0 0 30px rgba(0, 212, 255, 0.6); }

        /* Animations */
        @keyframes strike { 0% { transform: rotate(0deg); } 25% { transform: rotate(-25deg) translate(-20px, -60px); } 100% { transform: rotate(0deg); } }
        .weapon-attack { animation: strike 0.4s ease-out forwards; }
        .hit-shake { transform: scale(0.97) translate(4px, 0); filter: brightness(1.2) !important; transition: 0.04s !important; }
        .shatter { opacity: 0 !important; transition: opacity 1.2s linear !important; }

        #loot-alert { position: absolute; top: 120px; width: 100%; text-align: center; color: var(--gold); font-size: 1.5rem; font-weight: 900; text-shadow: 0 0 10px black; pointer-events: none; opacity: 0; z-index: 1000; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="loot-alert">ITEM UNLOCKED!</div>

    <div id="hud-container">
        <div class="hud-orb" id="level-orb">1</div>
        <div id="exp-bar-container"><div id="exp-fill"></div></div>
        <div class="inventory-brief">
            <div style="color: var(--gold)"><span id="coins">0</span> ◈</div>
            <div style="color: var(--aura-silver)"><span id="ore">0</span> ORE</div>
            <div style="color: var(--aura-blue)"><span id="fish">0</span> FISH</div>
        </div>
    </div>

    <div id="world-container">
        <div id="game-bg"></div>
        <img src="slime.png" id="target" class="target-img">
        <img src="stick.png" id="weapon-hand">
    </div>

    <div id="footer">
        <div id="gold-pill">
            <span onclick="buyBounty()">BOUNTY (<span id="bounty-cost">100</span>)</span>
            <span style="color: #444;">|</span>
            <span onclick="polishWeapon()">POLISH +<span id="polish-lv">0</span> (<span id="polish-cost">500</span>)</span>
        </div>

        <div id="btn-forge" class="action-btn side-btn disabled" onclick="useOre()">
            <div class="btn-val" id="ore-cost">5</div><div class="btn-label">FORGE</div>
        </div>
        <div id="main-action" class="action-btn main-strike" onclick="toggleAuto()">
            <img src="attackicon.png" style="width:40px;">
        </div>
        <div id="btn-buff" class="action-btn side-btn disabled" onclick="useFish()">
            <div class="btn-val" id="fish-cost">3</div><div class="btn-label">VITAL</div>
        </div>
    </div>

    <script>
        let state = {
            level: 1, exp: 0, coins: 0, ore: 0, fish: 0,
            active: false, power: 1, speed: 2500,
            oreReq: 5, fishReq: 3,
            polish: 0,
            hasSword: false, hasDagger: false, hasGreatsword: false, hasScythe: false,
            currentZone: 1, forceBoss: false,
            data: {
                hunt: { img: 'slime.png', aura: '#00ff88', hp: 100 },
                mine: { img: 'ore.png', aura: '#bdc3c7', hp: 100 },
                fish: { img: 'fish.png', aura: '#00d4ff', hp: 100 },
                boss_z1: { img: 'slime.png', aura: '#ff4444', hp: 500 },
                wolf_z2: { img: 'fire_wolf.png', aura: '#ff4500', hp: 2500 },
                behemoth_z3: { img: 'behemoth.png', aura: '#ff0000', hp: 10000 },
                titan_z4: { img: 'titan.png', aura: '#ffffff', hp: 50000 }
            }
        };

        const targetEl = document.getElementById('target');
        const weaponEl = document.getElementById('weapon-hand');
        let hp = 100;
        let actionTimer = null;

        function toggleAuto() {
            state.active = !state.active;
            document.getElementById('main-action').classList.toggle('active-glow', state.active);
            if (state.active && hp > 0) actionLoop();
            else clearTimeout(actionTimer);
        }

        function actionLoop() {
            clearTimeout(actionTimer);
            if (!state.active || hp <= 0) return;
            weaponEl.classList.add('weapon-attack');
            setTimeout(() => weaponEl.classList.remove('weapon-attack'), 400);

            actionTimer = setTimeout(() => {
                let polishMult = 1 + (state.polish * 0.15); // +15% per polish level
                let damage = (34 * state.power) * polishMult;
                if (state.hasSword) damage *= 2;
                if (state.hasDagger) damage *= 1.5;

                hp -= damage;
                targetEl.classList.add('hit-shake');
                setTimeout(() => targetEl.classList.remove('hit-shake'), 40);
                
                if (hp <= 0) finishTarget();
                else actionTimer = setTimeout(actionLoop, state.speed);
            }, 250);
        }

        function finishTarget() {
            targetEl.classList.add('shatter');
            state.coins += state.currentZone * 15;
            state.exp += 25;
            if (state.exp >= 100) { state.level++; state.exp = 0; }
            updateUI();
            setTimeout(() => { targetEl.src = ""; respawn(); }, 1200);
        }

        function buyBounty() {
            let costs = [0, 100, 500, 2500, 10000];
            let cost = costs[state.currentZone];
            if (state.coins >= cost) {
                state.coins -= cost;
                state.forceBoss = true;
                updateUI();
            }
        }

        function polishWeapon() {
            let baseCosts = [0, 500, 2500, 10000, 25000];
            let cost = baseCosts[state.currentZone] * (state.polish + 1);
            if (state.coins >= cost && state.polish < 3) {
                state.coins -= cost;
                state.polish++;
                applyPolishEffects();
                updateUI();
            }
        }

        function applyPolishEffects() {
            let glow = "none";
            if (state.polish === 1) glow = "brightness(1.2) drop-shadow(0 0 5px gold)";
            if (state.polish === 2) glow = "brightness(1.4) drop-shadow(0 0 15px gold)";
            if (state.polish === 3) glow = "brightness(1.6) drop-shadow(0 0 25px white)";
            weaponEl.style.filter = glow;
        }

        function respawn() {
            targetEl.classList.remove('shatter');
            let bossKey = ['boss_z1', 'wolf_z2', 'behemoth_z3', 'titan_z4'][state.currentZone-1];
            
            if (state.forceBoss) {
                state.currentTarget = bossKey;
                state.forceBoss = false;
            } else {
                state.currentTarget = ['hunt', 'mine', 'fish'][Math.floor(Math.random()*3)];
            }

            let info = state.data[state.currentTarget];
            hp = info.hp;
            targetEl.src = info.img;
            targetEl.style.filter = `drop-shadow(0 0 25px ${info.aura})`;
            if (state.active) actionLoop();
        }

        function updateUI() {
            document.getElementById('coins').innerText = state.coins;
            document.getElementById('level-orb').innerText = state.level;
            document.getElementById('exp-fill').style.width = state.exp + "%";
            document.getElementById('polish-lv').innerText = state.polish;
            
            let bountyCosts = [0, 100, 500, 2500, 10000];
            document.getElementById('bounty-cost').innerText = bountyCosts[state.currentZone];
            
            let polishBase = [0, 500, 2500, 10000, 25000];
            document.getElementById('polish-cost').innerText = polishBase[state.currentZone] * (state.polish + 1);
        }

        window.onload = () => { updateUI(); respawn(); };
    </script>
</body>
</html>
